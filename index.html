<html lang="fr" class="scroll-smooth">

    <meta charset="UTF-8" />

    <title>Tunisie Déménagement - Devis Gratuit & Service Pro</title>
    <meta name="description" content="Déménagement professionnel partout en Tunisie. Transporteur Tunis, Location Monte-meuble, et équipes qualifiées. Obtenez votre devis gratuit en ligne." />
    <meta name="keywords" content="Déménagement Tunisie, Transporteur Tunis, Location Monte-meuble, Déménagement Sousse, Déménagement Sfax" />
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                blue: '#0F172A', // Slate 900
                primary: '#2563EB', // Royal Blue
                orange: '#F97316', // Bright Orange
                orangeLight: '#FB923C',
                dark: '#020617', // Slate 950
                light: '#F8FAFC', // Slate 50
              }
            },
            boxShadow: {
              'soft': '0 10px 40px -10px rgba(0, 0, 0, 0.08)',
              'glow': '0 0 20px rgba(37, 99, 235, 0.2)',
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'blob': 'blob 7s infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
